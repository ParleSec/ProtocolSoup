# fly.toml - Protocol Soup main application
# Deploy with: fly deploy
#
# For SPIFFE support, first deploy the SPIRE Server:
#   fly launch --config fly.spire-server.toml --name protocolsoup-spire
#   fly secrets set SPIRE_JOIN_TOKEN=$(fly ssh console -a protocolsoup-spire -C "/opt/spire/bin/spire-server token generate -spiffeID spiffe://protocolsoup.com/agent/fly -ttl 86400 | grep Token | awk '{print \$2}'")

app = 'protocolsoup'
primary_region = 'syd'

[build]
  dockerfile = 'docker/Dockerfile.fly'

[env]
  PORT = '8080'
  SHOWCASE_BASE_URL = 'https://protocolsoup.com'
  SHOWCASE_CORS_ORIGINS = 'https://protocolsoup.com,https://www.protocolsoup.com,https://protocolsoup.fly.dev'
  SHOWCASE_DEBUG = 'false'
  SHOWCASE_ENV = 'production'
  SHOWCASE_LISTEN_ADDR = ':8080'
  SHOWCASE_FRONTEND_ORIGIN = 'http://127.0.0.1:3000'
  BACKEND_ORIGIN = 'http://127.0.0.1:8080'
  NEXT_PUBLIC_SITE_URL = 'https://protocolsoup.com'
  SHOWCASE_MOCK_IDP = 'true'
  SHOWCASE_PALETTE_DB = '/app/palette.db'

  # Persistent OP signing keys on the shared /data volume. Required for OIDF
  # certification: signing keys and their kids must survive restarts and retired
  # public keys are retained in JWKS so previously issued tokens stay verifiable.
  SHOWCASE_KEY_STORE_PATH = '/data/keys'

  # OIDF conformance suite callback URLs registered for the two static
  # conformance clients (exact match, no wildcards). These cover the locally run
  # suite used for CI drift monitoring (localhost.emobix.co.uk) and the hosted
  # official certification suite (www.certification.openid.net), which is the
  # source of certification evidence, for the aliases the harness uses. The
  # alias is protocolsoup-<label> for each harness label (basic, basic-post,
  # implicit, hybrid, formpost-basic, formpost-implicit, formpost-hybrid), so the
  # hosted portal plan must use the matching alias. The clients are only created
  # when OIDC_CONFORMANCE_CLIENT_SECRET is also set as a Fly secret, so listing
  # these URLs alone changes nothing.
  OIDC_CONFORMANCE_REDIRECT_URIS = 'https://localhost.emobix.co.uk:8443/test/a/protocolsoup-basic/callback,https://localhost.emobix.co.uk:8443/test/a/protocolsoup-basic-post/callback,https://localhost.emobix.co.uk:8443/test/a/protocolsoup-implicit/callback,https://localhost.emobix.co.uk:8443/test/a/protocolsoup-hybrid/callback,https://localhost.emobix.co.uk:8443/test/a/protocolsoup-formpost-basic/callback,https://localhost.emobix.co.uk:8443/test/a/protocolsoup-formpost-implicit/callback,https://localhost.emobix.co.uk:8443/test/a/protocolsoup-formpost-hybrid/callback,https://www.certification.openid.net/test/a/protocolsoup-basic/callback,https://www.certification.openid.net/test/a/protocolsoup-basic-post/callback,https://www.certification.openid.net/test/a/protocolsoup-implicit/callback,https://www.certification.openid.net/test/a/protocolsoup-hybrid/callback,https://www.certification.openid.net/test/a/protocolsoup-formpost-basic/callback,https://www.certification.openid.net/test/a/protocolsoup-formpost-implicit/callback,https://www.certification.openid.net/test/a/protocolsoup-formpost-hybrid/callback'
  
  # SPIFFE/SPIRE Configuration
  # The agent will connect to SPIRE Server via Fly private network
  SPIRE_SERVER_ADDRESS = 'protocolsoup-spire.internal'
  SPIFFE_TRUST_DOMAIN = 'protocolsoup.com'
  SPIRE_DATA_DIR = '/data/spire'
  
  # SCIM Configuration - uses subdirectory of shared volume
  SCIM_DATA_DIR = '/data/scim'

# Secrets required (set via `fly secrets set`):
# - SPIRE_JOIN_TOKEN: Join token from SPIRE Server for agent bootstrap
# - SCIM_API_TOKEN: Bearer token for SCIM authentication
#
# OIDF conformance secrets (set only when running certification; without them the
# conformance clients are never registered, so production is unaffected):
# - OIDC_CONFORMANCE_CLIENT_SECRET: secret for the conformance clients. Must match
#   the secret the harness/suite presents (OIDC_CONFORMANCE_CLIENT_SECRET).
# - OIDC_CONFORMANCE_CLIENT2_SECRET (optional): distinct secret for the second
#   client; defaults to OIDC_CONFORMANCE_CLIENT_SECRET when unset.
# - The conformance end user (alice@example.com) password used by the suite is the
#   demo user's password; align OIDC_CONFORMANCE_PASSWORD in the harness with it.
#
# Optional OID4VP verifier_attestation secrets:
# - OID4VP_VERIFIER_ATTESTATION_ISSUER: override attestation issuer URL (defaults to <SHOWCASE_BASE_URL>/oid4vp/verifier-attestation)
# - OID4VP_VERIFIER_ATTESTATION_CLIENT_ID: override verifier_attestation client_id (defaults to verifier_attestation:<public-host>)
# - OID4VP_VERIFIER_ATTESTATION_PRIVATE_KEY_PEM: PEM-encoded stable signing key for verifier attestation JWT/JWKS continuity across restarts
#
# Optional OID4VP x509_san_dns verifier secrets:
# - OID4VP_X509_SANDNS_CLIENT_ID: x509_san_dns verifier identifier (for example x509_san_dns:verifier.protocolsoup.com)
# - OID4VP_X509_SANDNS_CERT_CHAIN_PEM: PEM-encoded certificate chain for request-object signing
# - OID4VP_X509_SANDNS_PRIVATE_KEY_PEM: PEM-encoded private key matching the leaf certificate

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'  # Extended for SPIRE Agent startup
    method = 'GET'
    path = '/health'

# Persistent volume for all app data (SPIRE + SCIM)
# Using single volume since Fly.io only supports 1 mount per machine
[[mounts]]
  source = "protocolsoup_data"
  destination = "/data"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[[metrics]]
  port = 9091
  path = '/metrics'
