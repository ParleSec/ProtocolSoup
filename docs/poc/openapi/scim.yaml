openapi: 3.1.0
info:
  title: ProtocolSoup SCIM API (POC)
  version: 0.1.0
  summary: SCIM 2.0 provisioning endpoints for ProtocolSoup.
  description: |
    Phase 0 POC OpenAPI seed for SCIM documentation evaluation.
    Endpoint set is based on the SCIM plugin routes and package docs.
servers:
  - url: http://localhost:8080
    description: Local SCIM service
security: []
tags:
  - name: Health
  - name: Discovery
  - name: Users
  - name: Groups
  - name: Bulk
paths:
  /health:
    get:
      tags:
        - Health
      summary: SCIM service health status
      operationId: getScimHealth
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api:
    get:
      tags:
        - Discovery
      summary: Service API index
      operationId: getScimApiIndex
      responses:
        "200":
          description: API index and endpoint map.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiIndexResponse"
  /scim/v2/ServiceProviderConfig:
    get:
      tags:
        - Discovery
      summary: Get SCIM service capabilities
      operationId: getServiceProviderConfig
      responses:
        "200":
          description: Service provider configuration.
          content:
            application/scim+json:
              schema:
                type: object
                additionalProperties: true
            application/json:
              schema:
                type: object
                additionalProperties: true
  /scim/v2/ResourceTypes:
    get:
      tags:
        - Discovery
      summary: List available SCIM resource types
      operationId: listResourceTypes
      responses:
        "200":
          description: SCIM resource type descriptors.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimListResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ScimListResponse"
  /scim/v2/Schemas:
    get:
      tags:
        - Discovery
      summary: List schema definitions
      operationId: listScimSchemas
      responses:
        "200":
          description: SCIM schema descriptors.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimListResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ScimListResponse"
  /scim/v2/Users:
    get:
      tags:
        - Users
      summary: List or filter users
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: filter
          schema:
            type: string
          description: SCIM filter expression.
        - in: query
          name: startIndex
          schema:
            type: integer
            minimum: 1
        - in: query
          name: count
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: User list response.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimListResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ScimListResponse"
        "401":
          description: Unauthorized request.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimError"
    post:
      tags:
        - Users
      summary: Create a user
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimUser"
          application/json:
            schema:
              $ref: "#/components/schemas/ScimUser"
      responses:
        "201":
          description: User created.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUser"
            application/json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "400":
          description: Invalid SCIM payload.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimError"
        "401":
          description: Unauthorized request.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimError"
  /scim/v2/Users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      tags:
        - Users
      summary: Get a user by ID
      operationId: getUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User resource.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUser"
            application/json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "404":
          description: User not found.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimError"
    put:
      tags:
        - Users
      summary: Replace a user
      operationId: replaceUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimUser"
          application/json:
            schema:
              $ref: "#/components/schemas/ScimUser"
      responses:
        "200":
          description: Replaced user resource.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "404":
          description: User not found.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimError"
    patch:
      tags:
        - Users
      summary: Patch user attributes
      operationId: patchUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/PatchOpRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/PatchOpRequest"
      responses:
        "200":
          description: Updated user resource.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "404":
          description: User not found.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimError"
    delete:
      tags:
        - Users
      summary: Delete a user
      operationId: deleteUser
      security:
        - bearerAuth: []
      responses:
        "204":
          description: User deleted.
        "404":
          description: User not found.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimError"
  /scim/v2/Groups:
    get:
      tags:
        - Groups
      summary: List groups
      operationId: listGroups
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Group list response.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimListResponse"
    post:
      tags:
        - Groups
      summary: Create group
      operationId: createGroup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimGroup"
      responses:
        "201":
          description: Group created.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroup"
        "400":
          description: Invalid group payload.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimError"
  /scim/v2/Groups/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      tags:
        - Groups
      summary: Get group by ID
      operationId: getGroup
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Group resource.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroup"
        "404":
          description: Group not found.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimError"
    put:
      tags:
        - Groups
      summary: Replace group
      operationId: replaceGroup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimGroup"
      responses:
        "200":
          description: Replaced group resource.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroup"
    patch:
      tags:
        - Groups
      summary: Patch group membership
      operationId: patchGroup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/PatchOpRequest"
      responses:
        "200":
          description: Updated group resource.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroup"
    delete:
      tags:
        - Groups
      summary: Delete group
      operationId: deleteGroup
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Group deleted.
        "404":
          description: Group not found.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimError"
  /scim/v2/Bulk:
    post:
      tags:
        - Bulk
      summary: Execute SCIM bulk operations
      operationId: bulkOperations
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/BulkRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/BulkRequest"
      responses:
        "200":
          description: Bulk operation response.
          content:
            application/scim+json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid bulk payload.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
        - protocols
      properties:
        status:
          type: string
          example: healthy
        version:
          type: string
          example: 1.0.0
        protocols:
          type: array
          items:
            type: string
          example:
            - scim
    ApiIndexResponse:
      type: object
      required:
        - service
        - version
        - protocols
        - endpoints
      properties:
        service:
          type: string
          example: protocol-lens
        version:
          type: string
          example: 1.0.0
        protocols:
          type: array
          items:
            type: string
        endpoints:
          type: object
          additionalProperties:
            type: string
    ScimListResponse:
      type: object
      required:
        - schemas
        - totalResults
        - Resources
      properties:
        schemas:
          type: array
          items:
            type: string
          example:
            - urn:ietf:params:scim:api:messages:2.0:ListResponse
        totalResults:
          type: integer
          minimum: 0
        startIndex:
          type: integer
          minimum: 1
        itemsPerPage:
          type: integer
          minimum: 0
        Resources:
          type: array
          items:
            type: object
            additionalProperties: true
    ScimUser:
      type: object
      required:
        - schemas
      properties:
        schemas:
          type: array
          items:
            type: string
        id:
          type: string
        userName:
          type: string
        active:
          type: boolean
        name:
          type: object
          properties:
            givenName:
              type: string
            familyName:
              type: string
        emails:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              type:
                type: string
              primary:
                type: boolean
        meta:
          type: object
          additionalProperties: true
    ScimGroup:
      type: object
      required:
        - schemas
      properties:
        schemas:
          type: array
          items:
            type: string
        id:
          type: string
        displayName:
          type: string
        members:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              display:
                type: string
              $ref:
                type: string
        meta:
          type: object
          additionalProperties: true
    PatchOpRequest:
      type: object
      required:
        - schemas
        - Operations
      properties:
        schemas:
          type: array
          items:
            type: string
          example:
            - urn:ietf:params:scim:api:messages:2.0:PatchOp
        Operations:
          type: array
          items:
            type: object
            required:
              - op
            properties:
              op:
                type: string
                enum:
                  - add
                  - replace
                  - remove
              path:
                type: string
              value:
                oneOf:
                  - type: object
                    additionalProperties: true
                  - type: array
                    items:
                      type: object
                      additionalProperties: true
                  - type: string
                  - type: number
                  - type: boolean
                  - type: "null"
    BulkRequest:
      type: object
      required:
        - schemas
        - Operations
      properties:
        schemas:
          type: array
          items:
            type: string
          example:
            - urn:ietf:params:scim:api:messages:2.0:BulkRequest
        failOnErrors:
          type: integer
          minimum: 0
        Operations:
          type: array
          items:
            type: object
            required:
              - method
              - path
            properties:
              method:
                type: string
                enum:
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
              path:
                type: string
              bulkId:
                type: string
              data:
                type: object
                additionalProperties: true
    ScimError:
      type: object
      required:
        - schemas
        - detail
        - status
      properties:
        schemas:
          type: array
          items:
            type: string
          example:
            - urn:ietf:params:scim:api:messages:2.0:Error
        detail:
          type: string
        status:
          type: string
        scimType:
          type: string
