openapi: 3.1.0
info:
  title: ProtocolSoup Gateway API (POC)
  version: 0.1.0
  summary: Aggregation and routing endpoints for ProtocolSoup services.
  description: |
    Phase 0 POC OpenAPI seed for gateway documentation evaluation.
    This captures representative health, index, protocol discovery, and demo session endpoints.
servers:
  - url: http://localhost:8080
    description: Local gateway service
security: []
tags:
  - name: Health
  - name: Discovery
  - name: Looking Glass
paths:
  /health:
    get:
      tags:
        - Health
      summary: Gateway health status
      operationId: getGatewayHealth
      responses:
        "200":
          description: Health status payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayHealthResponse"
  /health/upstreams:
    get:
      tags:
        - Health
      summary: Upstream health status
      operationId: getGatewayUpstreamHealth
      responses:
        "200":
          description: At least one upstream is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpstreamHealthResponse"
        "503":
          description: No upstreams are healthy or configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpstreamHealthResponse"
  /api:
    get:
      tags:
        - Discovery
      summary: Gateway API index
      operationId: getGatewayApiIndex
      responses:
        "200":
          description: High-level endpoint map and protocol list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiIndexResponse"
  /api/protocols:
    get:
      tags:
        - Discovery
      summary: List aggregated protocols
      operationId: listAggregatedProtocols
      responses:
        "200":
          description: Aggregated protocol list from available upstreams.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolListResponse"
        "503":
          description: No protocols currently available from upstreams.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/protocols/{id}/flows:
    get:
      tags:
        - Discovery
      summary: Get flow definitions for a protocol
      operationId: getProtocolFlows
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Protocol identifier such as `scim`, `oidc`, or `oauth2`.
      responses:
        "200":
          description: Flow definitions proxied from owning upstream service.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowListResponse"
        "404":
          description: Protocol not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/protocols/{id}/demo/{flow}:
    post:
      tags:
        - Looking Glass
      summary: Start a protocol demo session
      operationId: startProtocolDemo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: flow
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Demo session metadata including websocket endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDemoResponse"
        "404":
          description: Protocol or flow not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ws/lookingglass/{session}:
    get:
      tags:
        - Looking Glass
      summary: Looking Glass websocket stream
      operationId: connectLookingGlassSession
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
      responses:
        "101":
          description: Connection upgraded to websocket.
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    GatewayHealthResponse:
      type: object
      required:
        - status
        - ready
      properties:
        status:
          type: string
          example: ok
        ready:
          type: boolean
          example: true
        last_refresh:
          type: string
          format: date-time
          example: "2026-03-06T19:20:11Z"
    UpstreamHealthResponse:
      type: object
      required:
        - status
        - ready
        - upstreams
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
            - no_upstreams
        ready:
          type: boolean
        upstreams:
          type: array
          items:
            $ref: "#/components/schemas/UpstreamHealth"
    UpstreamHealth:
      type: object
      required:
        - name
        - url
        - status
        - protocol_count
        - last_checked
        - health_endpoint
      properties:
        name:
          type: string
          example: scim
        url:
          type: string
          example: http://scim:8080
        status:
          type: string
          enum:
            - healthy
            - unhealthy
            - error
        error:
          type: string
        protocol_count:
          type: integer
          minimum: 0
        last_checked:
          type: string
          format: date-time
        health_endpoint:
          type: string
    ApiIndexResponse:
      type: object
      required:
        - service
        - version
        - ready
        - protocols
        - endpoints
      properties:
        service:
          type: string
          example: protocol-lens-gateway
        version:
          type: string
          example: 1.0.0
        ready:
          type: boolean
        protocols:
          type: array
          items:
            type: string
          example:
            - oauth2
            - oidc
            - scim
        endpoints:
          type: object
          additionalProperties:
            type: string
    ProtocolListResponse:
      type: object
      required:
        - protocols
      properties:
        protocols:
          type: array
          items:
            $ref: "#/components/schemas/ProtocolSummary"
    ProtocolSummary:
      type: object
      required:
        - id
        - name
        - version
        - description
        - tags
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
    FlowListResponse:
      type: object
      required:
        - flows
      properties:
        flows:
          type: array
          items:
            type: object
            additionalProperties: true
    StartDemoResponse:
      type: object
      required:
        - session_id
        - protocol
        - flow
        - ws_endpoint
      properties:
        session_id:
          type: string
        protocol:
          type: string
        flow:
          type: string
        ws_endpoint:
          type: string
          example: /ws/lookingglass/session-123
        scenario:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
