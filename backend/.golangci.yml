version: "2"
run:
  modules-download-mode: readonly
output:
  formats:
    text:
      path: stdout
linters:
  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (io.Writer).Write
        - (*html/template.Template).Execute
        - (*text/template.Template).Execute
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: internal/lookingglass/
        text: SetReadDeadline|SetWriteDeadline|WriteMessage
      - linters:
          - errcheck
        text: rand.Read
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
