name: Docs Quality

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  openapi-lint:
    name: OpenAPI Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint OpenAPI specs
        run: npx @redocly/cli lint --config redocly.yaml gateway@v1 scim@v1 federation@v1 vc@v1

  docs-build:
    name: API Docs Build Validation
    runs-on: ubuntu-latest
    needs: [openapi-lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build API reference pages
        run: mkdir -p .docs-build && npx @redocly/cli build-docs openapi/v1/gateway.yaml -o .docs-build/gateway.html && npx @redocly/cli build-docs openapi/v1/scim.yaml -o .docs-build/scim.html && npx @redocly/cli build-docs openapi/v1/federation.yaml -o .docs-build/federation.html && npx @redocly/cli build-docs openapi/v1/vc.yaml -o .docs-build/vc.html

      - name: Upload docs build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-docs-build
          path: .docs-build/
          retention-days: 7
