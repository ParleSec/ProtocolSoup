name: CI/CD Pipeline

on:
  push:
    branches: [ '**' ]  # Trigger on any branch push
  pull_request:
    branches: [ master, develop ]

# Set default permissions to read-only for security
permissions:
  contents: read

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'

jobs:
  # Job 1: Frontend Security Scanning
  frontend-security-scan:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      
      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: false
      
      - name: Run Snyk Security Scan (Frontend)
        uses: snyk/actions/node@0.4.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-frontend.sarif --file=frontend/package.json
      
      - name: Validate and Filter Frontend SARIF
        id: validate_frontend_sarif
        run: |
          if [ ! -f snyk-frontend.sarif ]; then
            echo "sarif_valid=false" >> $GITHUB_OUTPUT
            echo "⚠️ Frontend SARIF file not generated. Snyk scan may have failed or SNYK_TOKEN not configured."
            exit 0
          fi
          
          # Check if SARIF has multiple runs from the same tool (CodeQL v4 requirement)
          run_count=$(jq '[.runs[] | select(.tool.driver.name == "Snyk Open Source")] | length' snyk-frontend.sarif 2>/dev/null || echo "0")
          
          if [ "$run_count" -gt 1 ]; then
            echo "⚠️ Multiple runs detected ($run_count). Filtering to single run for CodeQL v4 compatibility..."
            # Keep only the first run from each tool
            jq '.runs = [.runs[0]]' snyk-frontend.sarif > snyk-frontend-filtered.sarif
            mv snyk-frontend-filtered.sarif snyk-frontend.sarif
          fi
          
          # Validate SARIF structure
          if jq -e '.runs | length > 0' snyk-frontend.sarif > /dev/null 2>&1; then
            echo "sarif_valid=true" >> $GITHUB_OUTPUT
            echo "✅ Frontend SARIF validated successfully ($(jq '.runs | length' snyk-frontend.sarif) run(s))"
          else
            echo "sarif_valid=false" >> $GITHUB_OUTPUT
            echo "❌ Frontend SARIF validation failed - no runs found"
          fi
        shell: bash
      
      - name: Upload Frontend Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: steps.validate_frontend_sarif.outputs.sarif_valid == 'true'
        continue-on-error: false
        with:
          sarif_file: snyk-frontend.sarif
          category: frontend-security
          wait-for-processing: true

  # Job 2: Backend Security Scanning
  backend-security-scan:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      
      - name: Download Go dependencies
        working-directory: backend
        run: go mod download
      
      - name: Run Snyk Security Scan (Backend)
        uses: snyk/actions/golang@0.4.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-backend.sarif --file=backend/go.mod
      
      - name: Validate and Filter Backend SARIF
        id: validate_backend_sarif
        run: |
          if [ ! -f snyk-backend.sarif ]; then
            echo "sarif_valid=false" >> $GITHUB_OUTPUT
            echo "⚠️ Backend SARIF file not generated. Snyk scan may have failed or SNYK_TOKEN not configured."
            exit 0
          fi
          
          # Check if SARIF has multiple runs from the same tool (CodeQL v4 requirement)
          run_count=$(jq '[.runs[] | select(.tool.driver.name == "Snyk Open Source")] | length' snyk-backend.sarif 2>/dev/null || echo "0")
          
          if [ "$run_count" -gt 1 ]; then
            echo "⚠️ Multiple runs detected ($run_count). Filtering to single run for CodeQL v4 compatibility..."
            # Keep only the first run from each tool
            jq '.runs = [.runs[0]]' snyk-backend.sarif > snyk-backend-filtered.sarif
            mv snyk-backend-filtered.sarif snyk-backend.sarif
          fi
          
          # Validate SARIF structure
          if jq -e '.runs | length > 0' snyk-backend.sarif > /dev/null 2>&1; then
            echo "sarif_valid=true" >> $GITHUB_OUTPUT
            echo "✅ Backend SARIF validated successfully ($(jq '.runs | length' snyk-backend.sarif) run(s))"
          else
            echo "sarif_valid=false" >> $GITHUB_OUTPUT
            echo "❌ Backend SARIF validation failed - no runs found"
          fi
        shell: bash
      
      - name: Upload Backend Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: steps.validate_backend_sarif.outputs.sarif_valid == 'true'
        continue-on-error: false
        with:
          sarif_file: snyk-backend.sarif
          category: backend-security
          wait-for-processing: true

  # Job 3: Snyk Code Analysis (SAST)
  code-security-scan:
    name: Code Security Scan (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Snyk Code Analysis
        uses: snyk/actions/node@0.4.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-code.sarif
      
      - name: Validate and Filter Code SARIF
        id: validate_code_sarif
        run: |
          if [ ! -f snyk-code.sarif ]; then
            echo "sarif_valid=false" >> $GITHUB_OUTPUT
            echo "⚠️ Code SARIF file not generated. Snyk Code scan may have failed."
            exit 0
          fi
          
          # Check if SARIF has multiple runs from the same tool (CodeQL v4 requirement)
          run_count=$(jq '[.runs[] | select(.tool.driver.name == "SnykCode")] | length' snyk-code.sarif 2>/dev/null || echo "0")
          
          if [ "$run_count" -gt 1 ]; then
            echo "⚠️ Multiple runs detected ($run_count). Filtering to single run for CodeQL v4 compatibility..."
            # Keep only the first run from each tool
            jq '.runs = [.runs[0]]' snyk-code.sarif > snyk-code-filtered.sarif
            mv snyk-code-filtered.sarif snyk-code.sarif
          fi
          
          # Validate SARIF structure
          if jq -e '.runs | length > 0' snyk-code.sarif > /dev/null 2>&1; then
            echo "sarif_valid=true" >> $GITHUB_OUTPUT
            echo "✅ Code SARIF validated successfully ($(jq '.runs | length' snyk-code.sarif) run(s))"
          else
            echo "sarif_valid=false" >> $GITHUB_OUTPUT
            echo "❌ Code SARIF validation failed - no runs found"
          fi
        shell: bash
      
      - name: Upload Snyk Code results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: steps.validate_code_sarif.outputs.sarif_valid == 'true'
        continue-on-error: false
        with:
          sarif_file: snyk-code.sarif
          category: code-security
          wait-for-processing: true

  # Job 4: Frontend Linting and Type Checking
  frontend-lint-and-typecheck:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      
      - name: Run TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit
      
      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # Job 5: Backend Linting and Vet
  backend-lint:
    name: Backend Lint & Vet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      
      - name: Download Go dependencies
        working-directory: backend
        run: go mod download

      - name: Run go vet
        working-directory: backend
        run: go vet ./...
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

  # Job 6: Backend Tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      
      - name: Download Go dependencies
        working-directory: backend
        run: go mod download
      
      - name: Check for test files
        id: check_tests
        working-directory: backend
        run: |
          if find . -name "*_test.go" -type f | grep -q .; then
            echo "tests_exist=true" >> $GITHUB_OUTPUT
          else
            echo "tests_exist=false" >> $GITHUB_OUTPUT
            echo "⚠️ No test files found. Consider adding tests to improve code quality."
          fi
      
      - name: Run Go tests
        if: steps.check_tests.outputs.tests_exist == 'true'
        working-directory: backend
        run: go test -v -race -coverprofile=coverage.out ./...
      
      - name: Upload coverage report
        if: steps.check_tests.outputs.tests_exist == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

  # Job 7: Build Frontend
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [frontend-security-scan, frontend-lint-and-typecheck]
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          CI: true
      
      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # Job 8: Build Backend
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [backend-security-scan, backend-lint, backend-test]
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      
      - name: Download Go dependencies
        working-directory: backend
        run: go mod download
      
      - name: Build backend binary
        working-directory: backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o server ./cmd/server
      
      - name: Upload backend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/server
          retention-days: 7

  # Job 9: Docker Build Test
  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image (test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.fly
          push: false
          tags: protocolsoup:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 10: Deploy main app to Fly.io (only on master branch)
  deploy:
    name: Deploy Main App to Fly.io
    runs-on: ubuntu-latest
    needs: [docker-build-test, code-security-scan]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@1.5
      
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      
      - name: Deployment notification
        if: success()
        run: echo "✅ Main app deployment to Fly.io successful!"

  # Job 11: Deploy wallet harness to Fly.io (only on master branch)
  deploy-wallet:
    name: Deploy Wallet Harness to Fly.io
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Validate wallet Fly token
        run: |
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "FLY_WALLET_API_TOKEN is not configured"
            exit 1
          fi
          flyctl auth whoami
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_WALLET_API_TOKEN }}
      
      - name: Deploy wallet harness to Fly.io
        run: flyctl deploy --config fly.wallet.toml --app protocolsoup-wallet --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_WALLET_API_TOKEN }}
      
      - name: Smoke test wallet health (direct Fly hostname)
        run: |
          curl -fsS "https://protocolsoup-wallet.fly.dev/health" | jq -e '.status == "ok"' > /dev/null

      - name: Check wallet subdomain health (non-blocking)
        continue-on-error: true
        run: |
          code="$(curl -sS -o /tmp/wallet-health.json -w '%{http_code}' "https://wallet.protocolsoup.com/health" || true)"
          if [ "$code" != "200" ]; then
            echo "wallet.protocolsoup.com returned HTTP $code (continuing; direct Fly smoke test already passed)"
          else
            jq -e '.status == "ok"' /tmp/wallet-health.json > /dev/null
          fi
      
      - name: Smoke test OID4VP wallet bootstrap
        run: |
          set -euo pipefail

          CREATE_PAYLOAD='{"response_mode":"direct_post","response_uri":"https://protocolsoup.com/oid4vp/response"}'
          create_response=""
          create_status=""
          create_endpoint=""
          for endpoint in \
            "https://protocolsoup.fly.dev/oid4vp/request/create" \
            "https://protocolsoup.com/oid4vp/request/create"
          do
            create_attempt="$(curl -sS -w '\n%{http_code}' -X POST "$endpoint" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d "$CREATE_PAYLOAD" || true)"
            attempt_body="$(echo "$create_attempt" | sed '$d')"
            attempt_status="$(echo "$create_attempt" | tail -n1)"
            if [ "${attempt_status}" -ge 200 ] && [ "${attempt_status}" -lt 300 ]; then
              create_response="$attempt_body"
              create_status="$attempt_status"
              create_endpoint="$endpoint"
              break
            fi
            echo "OID4VP create request via ${endpoint} failed with HTTP ${attempt_status}"
            echo "$attempt_body"
          done
          if [ -z "$create_response" ]; then
            echo "OID4VP create request failed across all endpoints"
            exit 1
          fi
          echo "OID4VP create request succeeded via ${create_endpoint} (HTTP ${create_status})"

          request_id="$(echo "$create_response" | jq -r '.request_id // empty')"
          request_jwt="$(echo "$create_response" | jq -r '.request // empty')"
          if [ -z "$request_id" ] || [ -z "$request_jwt" ]; then
            echo "OID4VP create request missing request_id or request JWT"
            echo "$create_response"
            exit 1
          fi

          wallet_payload="$(jq -n \
            --arg rid "$request_id" \
            --arg req "$request_jwt" \
            '{request_id:$rid, request:$req, response_mode:"direct_post"}')"

          submit_response="$(curl -sS -w '\n%{http_code}' -X POST "https://protocolsoup-wallet.fly.dev/submit" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "$wallet_payload")"
          submit_body="$(echo "$submit_response" | sed '$d')"
          submit_status="$(echo "$submit_response" | tail -n1)"

          if [ "${submit_status}" -lt 200 ] || [ "${submit_status}" -ge 300 ]; then
            echo "Wallet submit failed with HTTP ${submit_status}"
            echo "$submit_body"
            exit 1
          fi

          old_error="$(echo "$submit_body" | jq -r '.error_description // empty')"
          if [ "$old_error" = "credential_jwt is required for wallet submission" ]; then
            echo "Wallet harness is still serving old behavior requiring credential_jwt"
            echo "$submit_body"
            exit 1
          fi

          credential_source="$(echo "$submit_body" | jq -r '.credential_source // empty')"
          if [ "$credential_source" != "auto_issued_oid4vci" ] && [ "$credential_source" != "cached_wallet_store" ]; then
            echo "Unexpected credential source: '$credential_source'"
            echo "$submit_body"
            exit 1
          fi
      
      - name: Wallet deployment notification
        if: success()
        run: echo "✅ Wallet harness deployment + smoke checks successful!"

  # Job 12: Lighthouse Performance Test (runs after deploy)
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: [deploy, deploy-wallet]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Wait for deployment to be ready
        run: sleep 30
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://protocolsoup.com
            https://protocolsoup.com/protocols
          uploadArtifacts: true
          temporaryPublicStorage: true

  # Job 13: Cleanup artifacts on PR close
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      actions: write
    
    steps:
      - name: Delete PR artifacts
        uses: geekyeggo/delete-artifact@v4
        with:
          name: |
            frontend-dist
            backend-binary
            backend-coverage

